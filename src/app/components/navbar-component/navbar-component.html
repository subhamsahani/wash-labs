 <nav class="navbar navbar-expand-lg custom-navbar">
  <div class="container">

    <!-- Logo -->
    <a class="navbar-brand" routerLink="/">
      <img src="pricing/washify.jpeg" alt="washify" style="height: 70px;">
      <div class="logo-text">
        <span class="small-title">ECO-FRIENDLY</span>
        <h4><strong>WashLab Laundry</strong></h4>
      </div>
    </a>

    <!-- Animated hamburger toggler -->
    <button
      class="navbar-toggler"
      type="button"
      [class.open]="isMenuOpen"
      (click)="toggleMenu()"
      [attr.aria-expanded]="isMenuOpen"
      aria-label="Toggle navigation">
      <span class="toggler-bar bar1"></span>
      <span class="toggler-bar bar2"></span>
      <span class="toggler-bar bar3"></span>
    </button>

    <!-- Slide-down animated menu -->
    <div class="navbar-collapse-custom" [class.open]="isMenuOpen">
      <ul class="navbar-nav mx-auto">
        @for (item of navItems; track item.route) {
          <li class="nav-item">
            <a
              class="nav-link"
              (click)="scrollTo(item.route)"
              routerLinkActive="active"
              (click)="closeMenu()">
              {{ item.label }}
            </a>
          </li>
        }
      </ul>

      <button class="contact-btn" (click)="callNow()">
        Get In Touch
      </button>
    </div>

  </div>
</nav>
